# Ficheiro de configuração do Alembic

[alembic]
# Caminho para os scripts de migração
script_location = %(here)s/alembic
sqlalchemy.url =

# Modelo opcional para nomes de ficheiros de migração.
# file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# Caminho adicionado ao sys.path, relativo a este ficheiro.
prepend_sys_path = .

# Fuso horário usado nas docstrings das migrações, se configurado.
# timezone =

# Comprimento máximo aplicado ao campo "slug".
# len_sqlalchemy_migrate_max_length =

# Localização dos ficheiros de migração.
# file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
